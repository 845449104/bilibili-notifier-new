version: '3.8'

services:
  bilibili-notifier:
    build: .
    container_name: bilibili-notifier
    restart: unless-stopped
    volumes:
      # 挂载配置文件
      - ./config.json:/app/config.json:ro
      # 挂载数据目录（用于持久化cookie和动态记录）
      - ./bili:/app/bili
      - ./www/wwwroot:/app/www/wwwroot
    environment:
      - TZ=Asia/Shanghai
    networks:
      - notifier-network
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/bili/cookie.txt') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  notifier-network:
    driver: bridge