name: Bilibili UP主自评论监控

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟检查一次
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests qrcode schedule
      
      - name: Run monitor
        env:
          # B站 Cookie（从浏览器复制）
          BILI_DEDEUSERID: ${{ secrets.BILI_DEDEUSERID }}
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}
          BILI_JCT: ${{ secrets.BILI_JCT }}
          # 飞书推送（可选，原脚本需要配置 config.json 或修改 send_feishu_self_comment）
          # 如果原脚本 config.json 里的 webhook 已配置，这里可不传
          # 状态持久化（强烈建议配置，避免重复推送）
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python github_runner.py
